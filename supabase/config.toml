# Funções não listadas aqui usam o default `verify_jwt = true` do Supabase.
# Categorias:
#   frontend     — chamada direta via supabase.functions.invoke() no src/
#   interna      — invocada por outra Edge Function (com service_role JWT)
#   órfã-legacy  — sem call-site mapeado; flipada para true em modo fail-safe
#                  (candidata a deleção em PR futura — ver docs/SEC-1-CHANGES.md)
# =============================================================================

