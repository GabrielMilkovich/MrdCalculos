name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      - run: mvn test -B

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker
      - run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/jasper-renderer:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/jasper-renderer:${{ github.sha }}
          gcloud run deploy jasper-renderer \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/jasper-renderer:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 10 \
            --max-instances 3 \
            --min-instances 0 \
            --timeout 60s \
            --port 8080 \
            --set-env-vars "API_KEY=${{ secrets.JASPER_API_KEY }}" \
            --quiet
