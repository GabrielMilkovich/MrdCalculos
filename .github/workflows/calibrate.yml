name: Calibration Pipeline

on:
  workflow_dispatch:
  push:
    branches: [claude/setup-stack-docs-rw8U9]
    paths:
      - 'scripts/calibration-pipeline.ts'
      - 'src/lib/pjecalc/**'
      - 'pjc-corpus/**'

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run calibration pipeline
        run: npm run calibrate

      - name: Upload calibration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: calibration-report
          path: calibration-*.json
          retention-days: 30
