name: Atualização Mensal de Índices BCB

on:
  schedule:
    # Dia 5 de cada mês às 06:00 UTC (BCB publica até dia 3-4)
    - cron: '0 6 5 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    name: Buscar índices BCB e atualizar fallback

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Atualizar índices
        run: npm run update-indices

      - name: Verificar se houve mudança
        id: check
        run: |
          if git diff --quiet src/lib/pjecalc/indices-fallback.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Nenhuma mudança nos índices."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Índices atualizados!"
          fi

      - name: Rodar parity gate após atualização
        if: steps.check.outputs.changed == 'true'
        run: npx vitest run src/lib/pjecalc/__tests__/parity-gate.test.ts --reporter=verbose

      - name: Commit e push automático
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/pjecalc/indices-fallback.ts
          git commit -m "chore: atualização automática de índices BCB $(date +%Y-%m)"
          git push
