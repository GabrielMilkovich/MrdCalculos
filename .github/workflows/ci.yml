name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      # ATENÇÃO: `tsc --noEmit` no tsconfig.json RAIZ é VÁCUO (files:[] + references
      # → compila 0 arquivos). O check de tipo REAL é `npm run typecheck`
      # (tsconfig.app.json). Non-blocking por ora: há ~627 erros pré-existentes de
      # tipos hand-written stale (ver CLAUDE.md "Gate de tipos"). Regra: um PR NÃO
      # pode AUMENTAR a contagem vs a base. Vira blocking quando o baseline zerar.
      - name: Type check (real, non-blocking)
        run: |
          npm run typecheck 2>&1 | tee /tmp/tsc-ci.txt || true
          echo "::warning::TS errors (tsconfig.app.json): $(grep -c 'error TS' /tmp/tsc-ci.txt || echo 0)"
        continue-on-error: true
      - run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3
