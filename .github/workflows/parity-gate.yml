name: Parity Gate — Modo Independente

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parity:
    runs-on: ubuntu-latest
    name: Paridade com PJe-Calc (≤±1% por caso)
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Rodar testes de paridade golden
        continue-on-error: true
        run: npx vitest run src/lib/pjecalc/__tests__/golden-pjc-cases.test.ts --reporter=verbose --config vitest.parity.config.ts
        env:
          PARITY_STRICT: 'true'

      - name: Verificar presença de arquivos .pjc
        id: check-pjc
        run: |
          COUNT=$(find public/reports -name "*.pjc" 2>/dev/null | wc -l)
          echo "pjc_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT .pjc files"

      - name: Rodar análise de paridade independente
        continue-on-error: true
        if: steps.check-pjc.outputs.pjc_count != '0'
        run: npx vitest run src/lib/pjecalc/__tests__/independent-parity-analysis.test.ts --reporter=verbose --config vitest.parity.config.ts
